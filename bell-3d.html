<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Hangar 3D: Bell X-1</title>
    <link rel="stylesheet" href="css/style.css">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.0.0/model-viewer.min.js"></script>
</head>
<body>

    <a href="hangar.html" class="back-btn">← Powrót do hangaru</a>

    <div class="viewer-container">

            alt="Model 3D Bell X-1"

            shadow-intensity="1"
            exposure="1.5"
            camera-orbit="0deg 75deg 105%">
